<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Admin Smart ChatLoja</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">

    <style>
        /* Estilos específicos apenas para a tela de login */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gray-light);
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(10, 37, 64, 0.05);
            border: 1px solid var(--border-color);
        }

        .login-card .form-control {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .login-card .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .login-card .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .error-message {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="text-center mb-4">
                <img src="/assets/img/logo_icone.png" alt="Smart ChatLoja" style="height: 50px; margin-bottom: 15px;">
                <h4 class="fw-bold" style="color: var(--text-dark);">Painel Administrativo</h4>
                <p class="text-muted small mb-0">Insira suas credenciais para acessar o sistema</p>
            </div>

            <!-- Mensagem de Erro -->
            <div id="errorMessage" class="error-message"></div>

            <!-- Formulário de Login -->
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="admin@smartchatloja.com.br" required autocomplete="email">
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" id="loginBtn" class="btn btn-custom-dark btn-login">
                    Entrar no Sistema
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="/" class="text-muted small text-decoration-none">← Voltar para o site principal</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');

            errorMessage.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Autenticando...';

            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.detail || 'E-mail ou senha incorretos.');
                }

                const data = await response.json();
                
                localStorage.setItem('smartchat_token', data.access_token);
                
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.style.display = 'block';
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Entrar no Sistema';
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
