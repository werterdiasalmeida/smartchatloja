<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos | Admin Smart ChatLoja</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS Global do Projeto -->
    <link href="/assets/css/style.css" rel="stylesheet">
    <!-- CSS Específico do Admin -->
    <link href="/admin/css/sidebar.css" rel="stylesheet">
    
    <style>
        .produto-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.2s;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .produto-card:hover {
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }
        
        .produto-card.inativo {
            opacity: 0.6;
            background: #f9fafb;
        }

        .empresa-tag {
            background-color: var(--accent);
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 8px 12px;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .produto-img-container {
            width: 100%;
            height: 180px;
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }

        .produto-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .produto-img-placeholder {
            color: #9ca3af;
            font-size: 3rem;
        }
        
        .produto-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .produto-nome {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .produto-sku {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
            margin-bottom: 12px;
        }

        .produto-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--text-dark);
        }

        .produto-info-row span:first-child {
            color: var(--text-muted);
        }

        .produto-actions {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
        }
        
        .btn-action {
            flex: 1;
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .btn-action:hover { background: var(--gray-light); }
        .btn-action.edit:hover { color: var(--accent); border-color: var(--accent); }
        .btn-action.delete:hover { color: #dc2626; border-color: #dc2626; background: #fef2f2; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
            border: 1px solid var(--border-color);
        }

        .sku-info {
            background-color: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .sku-info i {
            color: #0284c7;
            margin-right: 8px;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 300px;
        }

        .search-container input {
            padding-left: 36px;
        }

        .search-container i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="admin-wrapper">
        <aside class="admin-sidebar" id="adminSidebar">
            <div id="sidebar-include"></div>
        </aside>

        <main class="admin-main">
            <header class="admin-header" id="header-include"></header>

            <div class="page-content">
                <div class="container-fluid">
                    
                    <!-- Cabeçalho -->
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                        <div>
                            <h4 class="fw-bold mb-1" style="color: var(--text-dark);">Catálogo de Produtos</h4>
                            <p class="text-muted mb-0">Gerencie os itens que o chatbot irá consultar.</p>
                        </div>
                        <button class="btn btn-custom-dark" data-bs-toggle="modal" data-bs-target="#modalProduto" onclick="abrirModalNovoProduto()">
                            <i class="bi bi-plus-lg me-2"></i>Novo Produto
                        </button>
                    </div>

                    <!-- Filtros -->
                    <div class="card border-0 shadow-sm mb-4" style="border-radius: 12px;">
                        <div class="card-body p-3">
                            <div class="row g-3 align-items-center">
                                <div class="col-md-6">
                                    <div class="search-container">
                                        <i class="bi bi-search"></i>
                                        <input type="text" class="form-control" id="inputBusca" placeholder="Buscar por nome, SKU, marca, modelo...">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <select class="form-select" id="filtroEmpresa" onchange="aplicarFiltro()">
                                        <option value="">Todas as Empresas</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Grid de Cards -->
                    <div class="row g-3" id="gridProdutos">
                        <div class="col-12 text-center py-5 text-muted">
                            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                            Carregando produtos...
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Cadastro/Edição -->
    <div class="modal fade" id="modalProduto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Cadastrar Novo Produto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body">
                    <form id="formProduto">
                        <div class="sku-info mb-3">
                            <i class="bi bi-info-circle-fill"></i>
                            <strong>SKU Automático:</strong> O código único do produto será gerado automaticamente pelo sistema ao salvar.
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Empresa *</label>
                                <select class="form-select" name="empresa_id" id="selectEmpresaForm" required>
                                    <option value="">Selecione...</option>
                                </select>
                            </div>

                            <div class="col-md-8">
                                <label class="form-label">Nome do Produto *</label>
                                <input type="text" class="form-control" name="nome" required placeholder="Ex: Vestido Midi Sofia Azul">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Categoria</label>
                                <input type="text" class="form-control" name="categoria" placeholder="Ex: Vestidos">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Marca</label>
                                <input type="text" class="form-control" name="marca" placeholder="Ex: Sofia Fashion">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Modelo</label>
                                <input type="text" class="form-control" name="modelo" placeholder="Ex: Midi">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Cor</label>
                                <input type="text" class="form-control" name="cor" placeholder="Ex: Azul Marinho">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Descrição (Para a IA)</label>
                                <textarea class="form-control" name="descricao" rows="3" placeholder="Descreva o produto, tecido, caimento, etc."></textarea>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Preço (R$) *</label>
                                <input type="number" step="0.01" class="form-control" name="preco" required placeholder="0.00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Estoque Atual *</label>
                                <input type="number" class="form-control" name="estoque_atual" required placeholder="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Tamanho</label>
                                <input type="text" class="form-control" name="tamanho" placeholder="Ex: M, 38, Único">
                            </div>

                            <div class="col-12 mt-3">
                                <label class="form-label">Imagem do Produto</label>
                                <input type="file" class="form-control" id="inputImagem" accept="image/*" onchange="previewImagem(this)">
                                <img id="previewImg" class="preview-img" alt="Pré-visualização">
                                <input type="hidden" name="imagem_base64" id="hiddenImagemBase64">
                                <input type="hidden" name="imagem_mime_type" id="hiddenImagemMimeType">
                            </div>
                        </div>
                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="formProduto" class="btn btn-custom-dark" id="btnSalvarProduto">
                        <span class="spinner-border spinner-border-sm d-none" id="loadingSalvar"></span>
                        Salvar Produto
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/js/sidebar.js"></script>
    
    <script>
        let editandoProdutoId = null;
        let filtroEmpresaId = '';
        let termoBusca = '';
        let debounceTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            carregarEmpresasParaFiltros();
            carregarProdutos();

            // Configurar busca com debounce
            document.getElementById('inputBusca').addEventListener('input', function(e) {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    termoBusca = e.target.value.trim().toLowerCase();
                    carregarProdutos();
                }, 300);
            });
            
            document.getElementById('formProduto').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const btnSalvar = document.getElementById('btnSalvarProduto');
                const loading = document.getElementById('loadingSalvar');
                const form = e.target;
                
                btnSalvar.disabled = true;
                loading.classList.remove('d-none');

                const formData = new FormData(form);
                const dadosProduto = {
                    empresa_id: parseInt(formData.get('empresa_id')),
                    nome: formData.get('nome'),
                    categoria: formData.get('categoria') || null,
                    marca: formData.get('marca') || null,
                    modelo: formData.get('modelo') || null,
                    cor: formData.get('cor') || null,
                    tamanho: formData.get('tamanho') || null,
                    descricao: formData.get('descricao') || null,
                    preco: parseFloat(formData.get('preco')),
                    estoque_atual: parseInt(formData.get('estoque_atual')),
                    imagem_base64: formData.get('imagem_base64') || null,
                    imagem_mime_type: formData.get('imagem_mime_type') || null
                };

                try {
                    const token = localStorage.getItem('smartchat_token');
                    const url = editandoProdutoId ? `/api/produtos/${editandoProdutoId}` : '/api/produtos/';
                    const method = editandoProdutoId ? 'PUT' : 'POST';

                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(dadosProduto)
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || 'Erro ao salvar produto.');
                    }

                    const modal = bootstrap.Modal.getInstance(document.getElementById('modalProduto'));
                    modal.hide();
                    form.reset();
                    document.getElementById('previewImg').style.display = 'none';
                    editandoProdutoId = null;
                    carregarProdutos();
                    
                } catch (error) {
                    alert('Erro: ' + error.message);
                } finally {
                    btnSalvar.disabled = false;
                    loading.classList.add('d-none');
                }
            });
        });

        async function carregarEmpresasParaFiltros() {
            try {
                const token = localStorage.getItem('smartchat_token');
                const response = await fetch('/api/empresas/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const empresas = await response.json();
                    const filtroSelect = document.getElementById('filtroEmpresa');
                    const formSelect = document.getElementById('selectEmpresaForm');
                    
                    empresas.filter(e => e.is_ativo).forEach(emp => {
                        filtroSelect.innerHTML += `<option value="${emp.id}">${emp.nome}</option>`;
                        formSelect.innerHTML += `<option value="${emp.id}">${emp.nome}</option>`;
                    });
                }
            } catch (error) {
                console.error('Erro ao carregar empresas:', error);
            }
        }

        function aplicarFiltro() {
            filtroEmpresaId = document.getElementById('filtroEmpresa').value;
            carregarProdutos();
        }

        function previewImagem(input) {
            const preview = document.getElementById('previewImg');
            const hiddenBase64 = document.getElementById('hiddenImagemBase64');
            const hiddenMime = document.getElementById('hiddenImagemMimeType');

            if (input.files && input.files[0]) {
                const file = input.files[0];
                const reader = new FileReader();

                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    hiddenBase64.value = e.target.result;
                    hiddenMime.value = file.type;
                }

                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
                hiddenBase64.value = '';
                hiddenMime.value = '';
            }
        }

        function abrirModalNovoProduto() {
            editandoProdutoId = null;
            document.getElementById('modalTitulo').textContent = 'Cadastrar Novo Produto';
            document.getElementById('formProduto').reset();
            document.getElementById('previewImg').style.display = 'none';
            
            if (filtroEmpresaId) {
                document.getElementById('selectEmpresaForm').value = filtroEmpresaId;
            }
        }

        async function abrirModalEditarProduto(id) {
            editandoProdutoId = id;
            document.getElementById('modalTitulo').textContent = 'Editar Produto';
            
            const token = localStorage.getItem('smartchat_token');
            try {
                const response = await fetch(`/api/produtos/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!response.ok) throw new Error('Erro ao buscar produto');
                
                const p = await response.json();
                const form = document.getElementById('formProduto');
                
                form.empresa_id.value = p.empresa_id;
                form.nome.value = p.nome;
                form.categoria.value = p.categoria || '';
                form.marca.value = p.marca || '';
                form.modelo.value = p.modelo || '';
                form.cor.value = p.cor || '';
                form.tamanho.value = p.tamanho || '';
                form.descricao.value = p.descricao || '';
                form.preco.value = p.preco;
                form.estoque_atual.value = p.estoque_atual;

                if (p.imagem_base64) {
                    document.getElementById('previewImg').src = p.imagem_base64;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('hiddenImagemBase64').value = p.imagem_base64;
                    document.getElementById('hiddenImagemMimeType').value = p.imagem_mime_type;
                } else {
                    document.getElementById('previewImg').style.display = 'none';
                }

                const modal = new bootstrap.Modal(document.getElementById('modalProduto'));
                modal.show();
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        }

        async function carregarProdutos() {
            const grid = document.getElementById('gridProdutos');
            grid.innerHTML = `
                <div class="col-12 text-center py-5 text-muted">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Carregando...
                </div>`;

            try {
                const token = localStorage.getItem('smartchat_token');
                let url = '/api/produtos/?limit=100';
                if (filtroEmpresaId) {
                    url += `&empresa_id=${filtroEmpresaId}`;
                }

                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Falha ao buscar produtos');

                let produtos = await response.json();

                // Filtrar por termo de busca no frontend
                if (termoBusca) {
                    produtos = produtos.filter(p => {
                        const textoCompleto = [
                            p.nome,
                            p.sku,
                            p.marca,
                            p.modelo,
                            p.categoria,
                            p.cor,
                            p.tamanho,
                            p.descricao,
                            p.empresa_nome
                        ].filter(Boolean).join(' ').toLowerCase();
                        
                        return textoCompleto.includes(termoBusca);
                    });
                }

                if (produtos.length === 0) {
                    grid.innerHTML = `
                        <div class="col-12 empty-state">
                            <i class="bi bi-box-seam d-block"></i>
                            <h5>${termoBusca ? 'Nenhum produto encontrado para esta busca' : 'Nenhum produto encontrado'}</h5>
                            <p>${termoBusca ? 'Tente outro termo ou limpe a busca.' : 'Clique em "Novo Produto" ou aguarde a sincronização do ETL.'}</p>
                        </div>`;
                    return;
                }

                grid.innerHTML = produtos.map(p => {
                    const estoqueBadge = p.estoque_atual > 0 
                        ? `<span class="badge bg-success bg-opacity-10 text-success">${p.estoque_atual} em estoque</span>`
                        : `<span class="badge bg-danger bg-opacity-10 text-danger">Esgotado</span>`;

                    const imgHtml = p.imagem_base64 
                        ? `<img src="${p.imagem_base64}" class="produto-img" alt="${p.nome}">`
                        : `<i class="bi bi-image produto-img-placeholder"></i>`;

                    return `
                    <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                        <div class="produto-card ${p.is_ativo ? '' : 'inativo'}">
                            
                            <!-- TARJA DA EMPRESA -->
                            <div class="empresa-tag">
                                ${p.empresa_nome}
                            </div>

                            <div class="produto-img-container">
                                ${imgHtml}
                            </div>
                            <div class="produto-body">
                                <div class="produto-nome" title="${p.nome}">${p.nome}</div>
                                <div class="produto-sku">SKU: ${p.sku}</div>
                                
                                <div class="produto-info-row">
                                    <span>Preço:</span>
                                    <span class="fw-bold">R$ ${p.preco.toFixed(2).replace('.', ',')}</span>
                                </div>
                                <div class="produto-info-row">
                                    <span>Estoque:</span>
                                    ${estoqueBadge}
                                </div>
                                ${p.categoria ? `
                                <div class="produto-info-row">
                                    <span>Categoria:</span>
                                    <span>${p.categoria}</span>
                                </div>` : ''}

                                <div class="produto-actions">
                                    <button class="btn-action edit" onclick="abrirModalEditarProduto(${p.id})">
                                        <i class="bi bi-pencil"></i> Editar
                                    </button>
                                    <button class="btn-action delete" onclick="desativarProduto(${p.id}, '${p.nome}')">
                                        <i class="bi bi-trash"></i> Excluir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `}).join('');

            } catch (error) {
                grid.innerHTML = `
                    <div class="col-12 text-center py-5 text-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Erro ao carregar dados.
                    </div>`;
            }
        }

        async function desativarProduto(id, nome) {
            if (!confirm(`Deseja desativar o produto "${nome}"?\nEle deixará de aparecer para o chatbot.`)) {
                return;
            }

            try {
                const token = localStorage.getItem('smartchat_token');
                const response = await fetch(`/api/produtos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Erro ao desativar.');
                }

                carregarProdutos();
            } catch (error) {
                alert('Erro: ' + error.message);
            }
        }
    </script>
</body>
</html>
