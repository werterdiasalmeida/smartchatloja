# ==========================================
# REDIRECIONAMENTO HTTP → HTTPS
# ==========================================
server {
    listen 80;
    server_name smartchatloja.com.br www.smartchatloja.com.br localhost;

    # Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona tudo para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ==========================================
# SERVIDOR HTTPS PRINCIPAL
# ==========================================
server {
    listen 443 ssl;
    http2 on;
    server_name smartchatloja.com.br www.smartchatloja.com.br;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/smartchatloja.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartchatloja.com.br/privkey.pem;

    # Configurações SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10M;

    # Bloqueia arquivos ocultos
    location ~ /\. {
        deny all;
    }

    # ==========================================
    # FRONTEND (Arquivos estáticos)
    # ==========================================
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ==========================================
    # API (Backend FastAPI)
    # ==========================================
    location /api/ {
        proxy_pass http://smartchat_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        client_max_body_size 10M;
    }

    # Documentação da API (Swagger/ReDoc)
    location /docs {
        proxy_pass http://smartchat_backend:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://smartchat_backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ==========================================
    # PÁGINAS DE ERRO
    # ==========================================
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}